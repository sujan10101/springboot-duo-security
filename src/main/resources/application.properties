# Server
server.port=8080

# Logging
logging.file.name=logs/duo-security.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.level.com.example.duosecurity=INFO

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/duo_security_db
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# JWT — 64-char hex = 32 bytes = 256-bit key for HS256
app.jwt.secret=4a8f2c9d1e6b3a7f5c0d4e9b2a1f8e3c6d5b4a7f2e1d9c8b3a6f5e4d3c2b1a0f
# Full auth token: 24 hours
app.jwt.expiration=86400000
# Pending MFA token: 30 minutes
app.jwt.mfa-pending-expiration=1800000

